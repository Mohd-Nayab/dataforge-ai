services:
  - type: web
    name: dataforge-backend
    runtime: node
    plan: free
    repo: https://github.com/Mohd-Nayab/dataforge-ai
    branch: main
    rootDir: backend
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: PYTHON_SERVICE_URL
        value: https://dataforge-python.onrender.com
      - key: CORS_ORIGIN
        value: https://dataforge-ai-five.vercel.app
      # Database: json (default) | sqlite | postgres | mongodb
      - key: DATABASE_TYPE
        value: json
      # Connection string for postgres/mongodb (leave empty for json/sqlite)
      - key: DATABASE_URL
        value: ""

  - type: web
    name: dataforge-python
    runtime: python
    plan: free
    repo: https://github.com/Mohd-Nayab/dataforge-ai
    branch: main
    rootDir: python-service
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port 8000 --log-level warning
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.15
      - key: CORS_ORIGINS
        value: https://dataforge-ai-five.vercel.app,https://dataforge-backend-3ixh.onrender.com
